version: "3.8"

services:
  oxidizer:
    build: .
    ports:
      - "7860:7860"
    environment:
      - CARGO_CONCURRENCY=2
      - CARGO_INCREMENTAL=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped
